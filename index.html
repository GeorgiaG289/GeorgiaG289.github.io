<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>资源导航站 - 首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 资源导航站</h1>
            <p>点击下方关键词，进入对应资源库</p>
        </header>

        <!-- 搜索框区域 -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 输入关键词搜索..." autocomplete="off">
            <div id="searchTips" class="search-tips"></div>
        </div>

        <!-- 关键词列表 -->
        <div class="keywords-grid" id="keywordsGrid">
            <!-- 关键词按钮会通过JS动态生成 -->
        </div>

        <footer>
            <p>💡 提示：点击关键词查看该分类下的所有网站链接</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
